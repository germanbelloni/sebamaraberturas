<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador Costos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-2xl shadow-xl w-80 text-center">

<img src="images/logo.png" class="mx-auto mb-4 w-48">

<h2 class="text-lg font-bold mb-4">Cotizador Interno</h2>

<select id="producto" onchange="resetear()" class="w-full p-2 border rounded-lg mb-2">
<option>Paño fijo</option>
<option>Premarco</option>
<option>Contramarco</option>
</select>

<input id="ancho" placeholder="Ancho (cm)" class="w-full p-2 border rounded-lg mb-2">
<input id="alto" placeholder="Alto (cm)" class="w-full p-2 border rounded-lg mb-2">

<div id="grupoCalidad">
<select id="calidad" class="w-full p-2 border rounded-lg mb-2"></select>
</div>

<div id="grupoColor">
<select id="color" class="w-full p-2 border rounded-lg mb-2"></select>
</div>

<div id="grupoVidrio">
<select id="vidrio" class="w-full p-2 border rounded-lg mb-4"></select>
</div>

<button onclick="calcular()"
class="w-full bg-gray-800 hover:bg-black text-white font-bold py-2 rounded-lg transition">
CALCULAR
</button>

<div id="resultado" class="mt-4 text-sm text-left"></div>

</div>

<script src="js/app.js"></script>
<script>
init();
</script>
</script>

</body>
</html>
