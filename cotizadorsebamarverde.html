<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-2xl shadow-xl w-80 text-center">

<img src="https://i.imgur.com/oY22aXP.png" class="mx-auto mb-4 w-48">

<h2 class="text-lg font-bold mb-4">Sebamar Ex2 Cotizador</h2>

<select id="producto" onchange="resetear()" class="w-full p-2 border rounded-lg mb-2">
<option>Paño fijo</option>
<option>Premarco</option>
<option>Contramarco</option>
</select>

<input id="ancho" placeholder="Ancho (cm)" class="w-full p-2 border rounded-lg mb-2">
<input id="alto" placeholder="Alto (cm)" class="w-full p-2 border rounded-lg mb-2">

<div id="grupoCalidad">
<select id="calidad" class="w-full p-2 border rounded-lg mb-2">
<option>Herrero</option>
<option>Modena</option>
</select>
</div>

<div id="grupoColor">
<select id="color" class="w-full p-2 border rounded-lg mb-2">
<option>Blanco</option>
<option>Negro</option>
<option>Bronce</option>
<option>Madera</option>
</select>
</div>

<div id="grupoVidrio">
<select id="vidrio" class="w-full p-2 border rounded-lg mb-4">
<option>3mm</option>
<option>4mm</option>
<option>5mm</option>
<option>4mm Fantasia</option>
<option>3+3</option>
<option>4+4</option>
</select>
</div>

<button onclick="calcular()" 
class="w-full bg-green-500 hover:bg-green-600 active:scale-95 transition transform text-white font-bold py-2 rounded-lg">
CALCULAR
</button>

<div id="resultado" class="text-3xl font-bold mt-4">$0</div>

</div>

<script>
function resetear(){
ancho.value="";
alto.value="";
resultado.innerText="$0";
actualizarUI();
}

function actualizarUI(){
let p = producto.value;

grupoVidrio.style.display = (p==="Paño fijo") ? "block":"none";
grupoCalidad.style.display = (p==="Paño fijo") ? "block":"none";
grupoColor.style.display = (p==="Premarco") ? "none":"block";
}

function calcular(){
let p = producto.value;
let a = ancho.value/100;
let h = alto.value/100;
let per = a*2+h*2;

let pl={"Herrero":10685,"Modena":17220};
let col={"Blanco":0,"Negro":0.3,"Bronce":0.45,"Madera":2.5};
let vid={"3mm":15072,"4mm":19459,"5mm":24880,"4mm Fantasia":24734,"3+3":62425,"4+4":69735};

let costo=0;

if(p==="Paño fijo"){
costo=(per*pl[calidad.value])*(1+col[color.value])+(a*h*vid[vidrio.value]);
}

if(p==="Premarco"){
costo=per*7035;
}

if(p==="Contramarco"){
costo=(per*3990)*(1+col[color.value]);
}

let precio=costo*(1-0.12)*(1+0.10)*(1+0.35);

resultado.innerText="$"+Math.round(precio);
}

actualizarUI();
</script>

</body>
</html>
