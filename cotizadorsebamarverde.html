<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EX2 Cotizador</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-2xl shadow-xl w-80 text-center">

<img src="images/logo.png" class="mx-auto mb-4 w-48">

<h2 class="text-lg font-bold mb-4">EX2 Cotizador</h2>

<select id="producto" onchange="resetear()" class="w-full p-2 border rounded-lg mb-2">
  <option>Paño fijo</option>
  <option>Premarco</option>
  <option>Contramarco</option>
</select>

<input id="ancho" placeholder="Ancho (cm)" class="w-full p-2 border rounded-lg mb-2">
<input id="alto" placeholder="Alto (cm)" class="w-full p-2 border rounded-lg mb-2">

<div id="grupoCalidad">
  <select id="calidad" class="w-full p-2 border rounded-lg mb-2"></select>
</div>

<div id="grupoColor">
  <select id="color" class="w-full p-2 border rounded-lg mb-2"></select>
</div>

<div id="grupoVidrio">
  <select id="vidrio" class="w-full p-2 border rounded-lg mb-4"></select>
</div>

<button onclick="calcular('verde')"
class="w-full bg-green-500 hover:bg-green-600 active:scale-95 transition text-white font-bold py-2 rounded-lg">
CALCULAR
</button>

<div id="resultado" class="text-3xl font-bold mt-4">$0</div>

</div>

<script src="js/app.js"></script>
<script>
init();
</script>

</body>

</html>
